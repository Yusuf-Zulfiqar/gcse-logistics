<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yusuf Zulfiqar – Exam Timetable Summer 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f4;--surface:#fff;--border:#e4ddd4;--border-light:#efe9e1;
  --text:#2c2418;--text-dim:#8a7e6e;--text-mid:#5c5145;
  --accent:#1a4a3a;--accent-light:#e8f0ec;
  --pickup-bg:#fef7ec;--pickup-border:#f0d68a;--pickup-text:#7a5c1f;
  --collect-bg:#edf4fe;--collect-border:#8ab4f0;--collect-text:#1f4a7a;
  --eng:#6b4c9a;--math:#c05830;--sci:#1a7a5a;
  --geo:#3a7ab8;--rs:#9a6b30;--lat:#8a3a5a;--grk:#3a5a8a;
  --shadow-sm:0 1px 3px rgba(44,36,24,.06);
  --shadow-md:0 4px 12px rgba(44,36,24,.08);
  --radius:12px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;}
.page-bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(26,74,58,.04),transparent),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(107,76,154,.03),transparent),var(--bg);}

.header{padding:2rem 1.5rem 1.5rem;text-align:center;border-bottom:1px solid var(–border-light);background:linear-gradient(180deg,#fff 0%,var(–bg) 100%);}
.header h1{font-family:‘Cormorant Garamond’,Georgia,serif;font-weight:700;font-size:clamp(1.6rem,4vw,2.4rem);color:var(–accent);letter-spacing:-.02em;margin-bottom:.25rem;}
.header .subtitle{font-size:.85rem;color:var(–text-dim);font-weight:500;letter-spacing:.04em;text-transform:uppercase;}
.header .cand-info{margin-top:.75rem;display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;font-size:.78rem;color:var(–text-mid);}
.header .cand-info span{background:var(–surface);border:1px solid var(–border-light);padding:.25rem .65rem;border-radius:100px;}

.stats{display:flex;gap:1px;background:var(–border-light);margin:1.25rem auto 0;max-width:700px;border-radius:var(–radius);overflow:hidden;box-shadow:var(–shadow-sm);}
.stat{flex:1;background:var(–surface);padding:.75rem .5rem;text-align:center;}
.stat-val{font-family:‘Cormorant Garamond’,serif;font-size:1.5rem;font-weight:700;color:var(–accent);}
.stat-label{font-size:.65rem;color:var(–text-dim);text-transform:uppercase;letter-spacing:.06em;margin-top:.1rem;}

.controls{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;padding:1rem 1.5rem;position:sticky;top:0;z-index:100;background:rgba(250,248,244,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(–border-light);}
.filter-btn{font-family:‘DM Sans’,sans-serif;font-size:.75rem;font-weight:600;padding:.4rem .8rem;border-radius:100px;border:1px solid var(–border);background:var(–surface);color:var(–text-mid);cursor:pointer;transition:all .2s;}
.filter-btn:hover{border-color:var(–accent);color:var(–accent);}
.filter-btn.active{background:var(–accent);color:#fff;border-color:var(–accent);}
.view-toggle{margin-left:auto;display:flex;gap:0;border:1px solid var(–border);border-radius:100px;overflow:hidden;}
.view-toggle button{font-family:‘DM Sans’,sans-serif;font-size:.7rem;font-weight:600;padding:.35rem .7rem;border:none;background:var(–surface);color:var(–text-dim);cursor:pointer;transition:all .2s;}
.view-toggle button.active{background:var(–accent);color:#fff;}

.timeline{max-width:700px;margin:0 auto;padding:1rem 1rem 3rem;}
.month-label{font-family:‘Cormorant Garamond’,serif;font-weight:700;font-size:1.3rem;color:var(–accent);padding:1.5rem 0 .75rem .5rem;border-bottom:2px solid var(–accent);margin-bottom:1rem;}

.day-card{background:var(–surface);border:1px solid var(–border-light);border-radius:var(–radius);margin-bottom:1rem;box-shadow:var(–shadow-sm);overflow:hidden;transition:box-shadow .25s,transform .25s;animation:cardIn .4s ease both;}
.day-card:hover{box-shadow:var(–shadow-md);transform:translateY(-1px);}
.day-card.is-today{border-color:var(–accent);box-shadow:0 0 0 3px rgba(26,74,58,.08),var(–shadow-md);}
.day-card.is-past{opacity:.55;}.day-card.is-past:hover{opacity:.85;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.day-header{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid var(–border-light);background:linear-gradient(135deg,rgba(26,74,58,.02),transparent);}
.day-date-circle{width:44px;height:44px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(–accent);color:#fff;flex-shrink:0;}
.day-date-circle .dn{font-weight:700;font-size:1.05rem;line-height:1;}
.day-date-circle .da{font-size:.55rem;text-transform:uppercase;letter-spacing:.06em;opacity:.85;margin-top:1px;}
.day-meta{flex:1;}.day-meta .df{font-weight:700;font-size:.9rem;}.day-meta .ds{font-size:.72rem;color:var(–text-dim);margin-top:.1rem;}
.day-badges{display:flex;gap:.3rem;flex-wrap:wrap;}
.badge-count{font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:100px;background:var(–accent-light);color:var(–accent);}
.day-card.is-today .day-date-circle{background:linear-gradient(135deg,#1a4a3a,#2a7a5a);box-shadow:0 2px 8px rgba(26,74,58,.3);}
.today-badge{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.15rem .5rem;border-radius:100px;background:#1a4a3a;color:#fff;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}

.transport{display:flex;gap:.5rem;padding:.65rem 1rem;border-bottom:1px solid var(–border-light);flex-wrap:wrap;}
.transport-chip{display:flex;align-items:center;gap:.4rem;font-size:.75rem;font-weight:600;padding:.35rem .7rem;border-radius:8px;flex:1;min-width:140px;}
.transport-chip.pickup{background:var(–pickup-bg);border:1px solid var(–pickup-border);color:var(–pickup-text);}
.transport-chip.collect{background:var(–collect-bg);border:1px solid var(–collect-border);color:var(–collect-text);}
.transport-chip svg{width:16px;height:16px;flex-shrink:0;}
.transport-chip .tl{font-weight:500;opacity:.8;font-size:.65rem;}
.transport-note{display:flex;align-items:center;gap:.4rem;font-size:.7rem;font-weight:500;color:#5c6b3a;background:#f4f7ec;border:1px solid #d4dfc0;padding:.3rem .7rem;border-radius:8px;margin:0 1rem .5rem;}

.exam-row{display:flex;align-items:center;gap:.65rem;padding:.6rem 1rem;border-bottom:1px solid var(–border-light);transition:background .15s;}
.exam-row:last-child{border-bottom:none;}.exam-row:hover{background:rgba(26,74,58,.015);}
.exam-time{font-size:.78rem;font-weight:700;font-variant-numeric:tabular-nums;width:58px;flex-shrink:0;color:var(–text-mid);}
.exam-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.exam-info{flex:1;min-width:0;}
.exam-subject{font-weight:700;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exam-component{font-size:.72rem;color:var(–text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exam-meta{display:flex;gap:.5rem;align-items:center;flex-shrink:0;}
.exam-duration{font-size:.7rem;font-weight:600;padding:.2rem .5rem;border-radius:6px;background:rgba(26,74,58,.06);color:var(–accent);white-space:nowrap;}
.exam-board{font-size:.6rem;color:var(–text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.exam-room{font-size:.65rem;color:var(–text-dim);}

.subj-eng .exam-dot{background:var(–eng);}.subj-eng .exam-subject{color:var(–eng);}
.subj-math .exam-dot{background:var(–math);}.subj-math .exam-subject{color:var(–math);}
.subj-bio .exam-dot,.subj-sci .exam-dot,.subj-phys .exam-dot{background:var(–sci);}
.subj-bio .exam-subject,.subj-sci .exam-subject,.subj-phys .exam-subject{color:var(–sci);}
.subj-geo .exam-dot{background:var(–geo);}.subj-geo .exam-subject{color:var(–geo);}
.subj-rs .exam-dot{background:var(–rs);}.subj-rs .exam-subject{color:var(–rs);}
.subj-lat .exam-dot{background:var(–lat);}.subj-lat .exam-subject{color:var(–lat);}
.subj-grk .exam-dot{background:var(–grk);}.subj-grk .exam-subject{color:var(–grk);}

.list-view .day-card{border-radius:8px;margin-bottom:.6rem;}
.list-view .day-header{padding:.6rem .8rem;}
.list-view .day-date-circle{width:36px;height:36px;}.list-view .day-date-circle .dn{font-size:.9rem;}
.list-view .exam-row{padding:.45rem .8rem;}

.legend{max-width:700px;margin:0 auto 2rem;padding:0 1rem;}
.legend-inner{background:var(–surface);border:1px solid var(–border-light);border-radius:var(–radius);padding:.85rem 1rem;display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:.3rem;font-size:.7rem;color:var(–text-mid);font-weight:500;}
.legend-dot{width:8px;height:8px;border-radius:50%;}

.footer{text-align:center;padding:1.5rem;font-size:.7rem;color:var(–text-dim);border-top:1px solid var(–border-light);}

@media(max-width:500px){
.header{padding:1.25rem 1rem 1rem;}.header h1{font-size:1.4rem;}
.stats{flex-wrap:wrap;}.stat{min-width:33%;}
.controls{padding:.75rem 1rem;}
.exam-meta{flex-direction:column;align-items:flex-end;gap:.2rem;}
.view-toggle{margin-left:0;}
.transport{flex-direction:column;gap:.35rem;}
}
@media print{
.controls,.view-toggle,.filter-btn{display:none!important;}
.page-bg{display:none;}.day-card{break-inside:avoid;box-shadow:none;border:1px solid #ccc;}
.day-card.is-past{opacity:1;}body{background:#fff;}
}
</style>

</head>
<body>
<div class="page-bg"></div>
<header class="header">
  <h1>Yusuf Zulfiqar</h1>
  <div class="subtitle">GCSE Examination Timetable &middot; Summer 2026</div>
  <div class="cand-info">
    <span>Candidate 2264</span>
    <span>Year 5 &middot; Reg 5A</span>
    <span>King Edward's School</span>
  </div>
  <div class="stats" id="stats"></div>
</header>
<nav class="controls" id="controls"></nav>
<main class="timeline" id="timeline"></main>
<div class="legend"><div class="legend-inner" id="legend"></div></div>
<footer class="footer">
  Pickup from home 1h 30min before first exam &middot; Collect from school after final exam<br>
  Generated from KES individual candidate timetable &middot; Updated April 2026
</footer>
<script>
const DATA=[
{date:'2026-05-06',pickup:'11:30 AM',collect:'4:00 PM',note:'Library revision after exam \u2013 joint pickup with Ayesha',exams:[
  {time:'1:00 PM',dur:'2h 00m',board:'CIE',subj:'English Language',comp:'Reading Paper 1',room:'Room 180',seat:'A1',cat:'eng'}]},
{date:'2026-05-08',pickup:'7:30 AM',collect:'1:30 PM',exams:[
  {time:'9:00 AM',dur:'1h 30m',board:'CIE',subj:'English Literature',comp:'Poetry and Prose',room:'Room 180',seat:'A1',cat:'eng'},
  {time:'12:00 PM',dur:'1h 30m',board:'WJEC',subj:'Latin',comp:'Language (Component 1)',room:'Room 180',seat:'C2',cat:'lat'}]},
{date:'2026-05-11',pickup:'7:30 AM',collect:'2:30 PM',exams:[
  {time:'9:00 AM',dur:'0h 45m',board:'CIE',subj:'English Literature',comp:'Drama (Open Text)',room:'Room 180',seat:'C2',cat:'eng'},
  {time:'10:05 AM',dur:'1h 15m',board:'CIE',subj:'English Literature',comp:'Unseen',room:'Room 180',seat:'C2',cat:'eng'},
  {time:'1:00 PM',dur:'1h 30m',board:'OCR',subj:'Classical Greek',comp:'Language Written',room:'Room 180',seat:'C2',cat:'grk'}]},
{date:'2026-05-12',pickup:'7:30 AM',collect:'4:00 PM',note:'Library revision after exam \u2013 joint pickup with Ayesha',exams:[
  {time:'9:00 AM',dur:'1h 45m',board:'AQA',subj:'Religious Studies',comp:'Paper 1 \u2013 Buddhism',room:'Room 180',seat:'C2',cat:'rs'},
  {time:'1:00 PM',dur:'2h 00m',board:'Edexcel',subj:'Biology',comp:'Written Paper 1B',room:'Room 180',seat:'C2',cat:'bio'}]},
{date:'2026-05-13',pickup:'7:30 AM',collect:'10:10 AM',exams:[
  {time:'9:00 AM',dur:'1h 10m',board:'Edexcel',subj:'Geography',comp:'Physical Geography',room:'Room 180',seat:'C2',cat:'geo'}]},
{date:'2026-05-14',pickup:'7:30 AM',collect:'11:00 AM',exams:[
  {time:'9:00 AM',dur:'2h 00m',board:'Edexcel',subj:'Mathematics',comp:'Written Paper 1H',room:'Room 180',seat:'C2',cat:'math'}]},
{date:'2026-05-15',pickup:'11:30 AM',collect:'2:15 PM',exams:[
  {time:'1:00 PM',dur:'1h 15m',board:'WJEC',subj:'Latin',comp:'Literature & Sources (Comp 2)',room:'Room 180',seat:'C2',cat:'lat'}]},
{date:'2026-05-18',pickup:'7:30 AM',collect:'11:00 AM',exams:[
  {time:'9:00 AM',dur:'2h 00m',board:'Edexcel',subj:'Chemistry',comp:'Written Paper 1C',room:'Room 180',seat:'C2',cat:'sci'}]},
{date:'2026-05-20',pickup:'11:30 AM',collect:'2:45 PM',exams:[
  {time:'1:00 PM',dur:'1h 45m',board:'AQA',subj:'Religious Studies',comp:'Paper 2A \u2013 Islam',room:'Room 180',seat:'C2',cat:'rs'}]},
{date:'2026-05-21',pickup:'10:45 AM',collect:'4:00 PM',exams:[
  {time:'12:15 PM',dur:'2h 00m',board:'CIE',subj:'English Language',comp:'Directed Writing & Composition',room:'Room 180',seat:'C2',cat:'eng'},
  {time:'3:00 PM',dur:'1h 00m',board:'WJEC',subj:'Latin',comp:'Literature \u2013 Narratives (Comp 3A)',room:'Room 180',seat:'C2',cat:'lat'}]},
{date:'2026-05-22',pickup:'11:30 AM',collect:'2:00 PM',exams:[
  {time:'1:00 PM',dur:'1h 00m',board:'OCR',subj:'Classical Greek',comp:'Prose Literature A Written',room:'Room 180',seat:'C2',cat:'grk'}]},
{date:'2026-06-01',pickup:'11:30 AM',collect:'2:00 PM',exams:[
  {time:'1:00 PM',dur:'1h 00m',board:'OCR',subj:'Classical Greek',comp:'Verse Literature B Written',room:'Econ2',seat:'A2',cat:'grk'}]},
{date:'2026-06-02',pickup:'7:30 AM',collect:'11:00 AM',exams:[
  {time:'9:00 AM',dur:'2h 00m',board:'Edexcel',subj:'Physics',comp:'Written Paper 1P',room:'Econ2',seat:'A2',cat:'phys'}]},
{date:'2026-06-03',pickup:'7:30 AM',collect:'2:45 PM',exams:[
  {time:'9:00 AM',dur:'2h 00m',board:'Edexcel',subj:'Mathematics',comp:'Written Paper 2H',room:'Econ2',seat:'A2',cat:'math'},
  {time:'1:00 PM',dur:'1h 45m',board:'Edexcel',subj:'Geography',comp:'Human Geography',room:'Econ2',seat:'A2',cat:'geo'}]},
{date:'2026-06-08',pickup:'7:30 AM',collect:'10:15 AM',exams:[
  {time:'9:00 AM',dur:'1h 15m',board:'Edexcel',subj:'Biology',comp:'Written Paper 2B',room:'Econ2',seat:'A2',cat:'bio'}]},
{date:'2026-06-12',pickup:'7:30 AM',collect:'10:15 AM',exams:[
  {time:'9:00 AM',dur:'1h 15m',board:'Edexcel',subj:'Chemistry',comp:'Written Paper 2C',room:'Econ2',seat:'A2',cat:'sci'}]},
{date:'2026-06-15',pickup:'7:30 AM',collect:'10:15 AM',exams:[
  {time:'9:00 AM',dur:'1h 15m',board:'Edexcel',subj:'Physics',comp:'Written Paper 2P',room:'Econ2',seat:'A2',cat:'phys'}]}
];

const SUBJ={eng:{l:‘English’,c:’#6b4c9a’},math:{l:‘Mathematics’,c:’#c05830’},bio:{l:‘Biology’,c:’#1a7a5a’},sci:{l:‘Chemistry’,c:’#1a7a5a’},phys:{l:‘Physics’,c:’#1a7a5a’},geo:{l:‘Geography’,c:’#3a7ab8’},rs:{l:‘Religious Studies’,c:’#9a6b30’},lat:{l:‘Latin’,c:’#8a3a5a’},grk:{l:‘Classical Greek’,c:’#3a5a8a’}};
const DAYS=[‘Sunday’,‘Monday’,‘Tuesday’,‘Wednesday’,‘Thursday’,‘Friday’,‘Saturday’];
const MO=[‘January’,‘February’,‘March’,‘April’,‘May’,‘June’,‘July’,‘August’,‘September’,‘October’,‘November’,‘December’];

function pd(s){const[y,m,d]=s.split(’-’).map(Number);return new Date(y,m-1,d);}
function fmt(d){return DAYS[d.getDay()]+’ ‘+d.getDate()+’ ’+MO[d.getMonth()];}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);return d<t;}

let af=‘all’,vm=‘detail’;

function buildStats(){
const te=DATA.reduce((a,d)=>a+d.exams.length,0);
const now=new Date();now.setHours(0,0,0,0);
const rem=DATA.filter(d=>pd(d.date)>=now).reduce((a,d)=>a+d.exams.length,0);
const nextDay=DATA.find(d=>pd(d.date)>=now);
const nextStr=nextDay?fmt(pd(nextDay.date)):‘All done!’;
document.getElementById(‘stats’).innerHTML=
`<div class="stat"><div class="stat-val">${DATA.length}</div><div class="stat-label">Exam Days</div></div>`+
`<div class="stat"><div class="stat-val">${te}</div><div class="stat-label">Papers</div></div>`+
`<div class="stat"><div class="stat-val">${te-rem}</div><div class="stat-label">Complete</div></div>`+
`<div class="stat"><div class="stat-val">${rem}</div><div class="stat-label">Remaining</div></div>`;
}

function buildControls(){
const el=document.getElementById(‘controls’);
let h=’<button class="filter-btn active" data-f="all">All</button>’;
[‘eng’,‘math’,‘bio’,‘sci’,‘phys’,‘geo’,‘rs’,‘lat’,‘grk’].forEach(c=>{
h+=`<button class="filter-btn" data-f="${c}">${SUBJ[c].l}</button>`;
});
h+=`<div class="view-toggle"><button class="active" data-v="detail">Detail</button><button data-v="list">Compact</button></div>`;
el.innerHTML=h;
el.querySelectorAll(’.filter-btn’).forEach(b=>b.onclick=()=>{
el.querySelectorAll(’.filter-btn’).forEach(x=>x.classList.remove(‘active’));
b.classList.add(‘active’);af=b.dataset.f;render();
});
el.querySelectorAll(’.view-toggle button’).forEach(b=>b.onclick=()=>{
el.querySelectorAll(’.view-toggle button’).forEach(x=>x.classList.remove(‘active’));
b.classList.add(‘active’);vm=b.dataset.v;render();
});
}

function buildLegend(){
let h=’’;const seen=new Set();
[‘eng’,‘math’,‘bio’,‘sci’,‘phys’,‘geo’,‘rs’,‘lat’,‘grk’].forEach(c=>{
if(!seen.has(SUBJ[c].l)){seen.add(SUBJ[c].l);h+=`<div class="legend-item"><div class="legend-dot" style="background:${SUBJ[c].c}"></div>${SUBJ[c].l}</div>`;}
});
h+=`<div class="legend-item"><div class="legend-dot" style="background:#f0d68a"></div>Home Pickup</div>`;
h+=`<div class="legend-item"><div class="legend-dot" style="background:#8ab4f0"></div>School Collection</div>`;
document.getElementById(‘legend’).innerHTML=h;
}

const carI=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14v-5l-2-5H7L5 12z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/></svg>`;
const schI=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22V8l10-6 10 6v14"/><path d="M6 12v6h4v-6"/><path d="M14 12v6h4v-6"/><path d="M12 7v1"/></svg>`;

function render(){
const tl=document.getElementById(‘timeline’);
tl.className=‘timeline’+(vm===‘list’?’ list-view’:’’);
let h=’’,cm=’’,dl=0;
DATA.forEach(day=>{
const d=pd(day.date),today=isToday(d),past=isPast(d);
const fe=af===‘all’?day.exams:day.exams.filter(e=>e.cat===af);
if(!fe.length)return;
const m=MO[d.getMonth()]+’ ‘+d.getFullYear();
if(m!==cm){cm=m;h+=`<div class="month-label">${m}</div>`;}
const cls=‘day-card’+(today?’ is-today’:’’)+(past&&!today?’ is-past’:’’);
h+=`<div class="${cls}" style="animation-delay:${dl*40}ms">`;
h+=`<div class="day-header"><div class="day-date-circle"><span class="dn">${d.getDate()}</span><span class="da">${DAYS[d.getDay()].slice(0,3)}</span></div>`;
h+=`<div class="day-meta"><div class="df">${fmt(d)}</div><div class="ds">${fe.length} paper${fe.length>1?'s':''} &middot; ${fe.map(e=>e.subj).filter((v,i,a)=>a.indexOf(v)===i).join(', ')}</div></div>`;
h+=`<div class="day-badges">${today?'<span class="today-badge">Today</span>':''}${fe.length>=3?'<span class="badge-count">Heavy day</span>':''}</div></div>`;
h+=`<div class="transport"><div class="transport-chip pickup">${carI}<div><div class="tl">Home pickup</div><strong>${day.pickup}</strong></div></div>`;
h+=`<div class="transport-chip collect">${schI}<div><div class="tl">School collect</div><strong>${day.collect}</strong></div></div></div>`;
fe.forEach(ex=>{
h+=`<div class="exam-row subj-${ex.cat}"><div class="exam-time">${ex.time}</div><div class="exam-dot"></div>`;
h+=`<div class="exam-info"><div class="exam-subject">${ex.subj}</div><div class="exam-component">${ex.comp}</div></div>`;
h+=`<div class="exam-meta"><div class="exam-duration">${ex.dur}</div><div class="exam-board">${ex.board}</div><div class="exam-room">${ex.room} &middot; ${ex.seat}</div></div></div>`;
});
h+=`</div>`;dl++;
});
tl.innerHTML=h;
const tc=tl.querySelector(’.is-today’);
if(tc)setTimeout(()=>tc.scrollIntoView({behavior:‘smooth’,block:‘center’}),300);
}

buildStats();buildControls();buildLegend();render();
</script>
